name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Backend: install from the lockfile and run the test suite. The retrieval
  # tests auto-skip when no knowledge base is present (see tests/test_retrieval.py),
  # so this needs neither a Gemini key nor an ingest step — pure + fast.
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --dev
      - run: uv run pytest -q

  # Frontend: a clean install + production build catches broken imports / JSX
  # before they ship.
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  # Docker: prove both images still build (they're the documented "just run it"
  # path, so a broken Dockerfile should fail CI, not the reviewer).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile.backend -t autosage-backend .
      - run: docker build -f docker/Dockerfile.frontend -t autosage-frontend .
