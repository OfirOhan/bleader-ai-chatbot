# AutoSage — full stack in two containers:
#   frontend (nginx: static bundle + /api proxy)  ->  backend (FastAPI + RAG)
#
# Run it (one command):
#   1. echo "GEMINI_API_KEY=your-key" >> .env
#   2. docker compose up --build      ->  open http://localhost:5173
#
# On first boot the backend builds the knowledge base automatically (see
# docker/entrypoint.sh), then serves. The KB (ChromaDB), chat history (SQLite)
# and model weights persist in named volumes, so later boots skip ingest and
# start instantly.

services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?put GEMINI_API_KEY in your .env file}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.1-flash-lite}
    volumes:
      - autosage-data:/data   # ChromaDB + SQLite
      - hf-cache:/models      # MiniLM + cross-encoder weights (downloaded once)
    ports:
      - "8000:8000"           # optional: hit the API / Swagger docs directly

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  autosage-data:
  hf-cache:
